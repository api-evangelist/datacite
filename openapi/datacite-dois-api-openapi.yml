      - draft
    MetaObject:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        count:
          type: number
    Links:
      type: object
      properties:
        self:
          type: string
        next:
          type: string
    relatedIdentifierType:
      description: '[DataCite Metadata Schema: relatedIdentifierType](https://datacite-metadata-schema.readthedocs.io/en/4/appendices/appendix-1/relatedIdentifierType/)'
      type: string
      enum:
      - ARK
      - arXiv
      - bibcode
      - CSTR
      - DOI
      - EAN13
      - EISSN
      - Handle
      - IGSN
      - ISBN
      - ISSN
      - ISTC
      - LISSN
      - LSID
      - PMID
      - PURL
      - RAiD
      - RRID
      - SWHID
      - UPC
      - URL
      - URN
      - w3id
    DoiDetailItem:
      description: Represents a single DOI and provides access to metadata attributes. More information is available at https://schema.datacite.org.
      type: object
      properties:
        data:
          type: object
          properties:
            id:
              type: string
              readOnly: true
            type:
              type: string
              enum:
              - dois
            attributes:
              allOf:
              - type: object
                properties:
                  doi:
                    description: The full DOI name.
                    type: string
                  event:
                    description: "Can be set to trigger a [DOI state change](https://support.datacite.org/docs/updating-metadata-with-the-rest-api#changing-the-doi-state). When not set, a [Draft record](https://support.datacite.org/docs/doi-states#draft-record) is created.\n  * `publish` - Create a DOI in [Findable state](https://support.datacite.org/docs/doi-states#findable-doi-name) (or change an existing Draft record/Registered DOI to Findable state).\n  * `register` - Create a DOI in [Registered state](https://support.datacite.org/docs/doi-states#registered-doi-name) (or change an existing Draft record to Registered state).\n  * `hide` - Change a DOI from Findable to Registered state.\n"
                    type: string
                    enum:
                    - publish
                    - register
                    - hide
                    writeOnly: true
                  prefix:
                    description: The DOI prefix.
                    type: string
                  suffix:
                    description: The DOI suffix.
                    readOnly: true
                    type: string
                  identifiers:
                    description: Equivalent to the [AlternateIdentifier](https://datacite-metadata-schema.readthedocs.io/en/4/properties/alternateidentifier/) property in the DataCite Metadata Schema. For more information, see [What is the "identifiers" attribute in the REST API?](https://support.datacite.org/docs/what-is-the-identifiers-attribute-in-the-rest-api)
                    type: array
                    items:
                      type: object
                      properties:
                        identifier:
                          type: string
                        identifierType:
                          type: string
                  alternateIdentifiers:
                    description: '[DataCite Metadata Schema: AlternateIdentifier](https://datacite-metadata-schema.readthedocs.io/en/4/properties/alternateidentifier/)'
                    type: array
                    items:
                      type: object
                      properties:
                        alternateIdentifierType:
                          type: string
                        alternateIdentifier:
                          type: string
              - $ref: '#/components/schemas/DoiPropertiesMetadata'
              - type: object
                properties:
                  xml:
                    description: DataCite Metadata Schema XML encoded in Base64 format.
                    type: string
              - $ref: '#/components/schemas/DoiPropertiesOther'
              - type: object
                properties:
                  viewCount:
                    $ref: '#/components/schemas/viewCount'
                  viewsOverTime:
                    readOnly: true
                    type: array
                    items:
                      type: object
                      properties:
                        yearMonth:
                          type: string
                        total:
                          type: number
                  downloadCount:
                    $ref: '#/components/schemas/downloadCount'
                  downloadsOverTime:
                    readOnly: true
                    type: array
                    items:
                      type: object
                      properties:
                        yearMonth:
                          type: string
                        total:
                          type: number
                  referenceCount:
                    $ref: '#/components/schemas/referenceCount'
                  citationCount:
                    $ref: '#/components/schemas/citationCount'
                  citationsOverTime:
                    readOnly: true
                    type: array
                    items:
                      type: object
                      properties:
                        year:
                          type: string
                        total:
                          type: number
                  partCount:
                    $ref: '#/components/schemas/partCount'
                  partOfCount:
                    $ref: '#/components/schemas/partOfCount'
                  versionCount:
                    $ref: '#/components/schemas/versionCount'
                  versionOfCount:
                    $ref: '#/components/schemas/versionOfCount'
                  landingPage:
                    readOnly: true
                    description: Data describing the landing page, used by link checking.
                    type: object
                    properties:
                      checked:
                        type: string
                      url:
                        type: string
                      contentType:
                        type: string
                      error:
                        type: string
                      redirectCount:
                        type: number
                      redirectUrls:
                        type: array
                        items:
                          type: string
                      downloadLatency:
                        type: number
                      hasSchemaOrg:
                        type: boolean
                      schemaOrgid:
                        type: string
                      dcIdentifier:
                        type: string
                      citationDoi:
                        type: string
                      bodyhasPid:
                        type: boolean
              - $ref: '#/components/schemas/DoiPropertiesDates'
            relationships:
              type: object
              readOnly: true
              properties:
                client:
                  type: object
                  description: The DataCite client (repository) associated with the DOI.
                  properties:
                    data:
                      $ref: '#/components/schemas/DataObject'
                provider:
                  type: object
                  description: The DataCite provider (Direct Member or Consortium Organization) associated with the DOI.
                  properties:
                    data:
                      $ref: '#/components/schemas/DataObject'
                media:
                  type: object
                  description: Legacy attribute for media support.
                  properties:
                    data:
                      $ref: '#/components/schemas/DataObject'
                references:
                  type: object
                  description: An array of references as dictionaries.
                  properties:
                    data:
                      $ref: '#/components/schemas/DataArray'
                citations:
                  type: object
                  description: An array of citations as dictionaries.
                  properties:
                    data:
                      $ref: '#/components/schemas/DataArray'
                parts:
                  description: An array of parts as dictionaries.
                  type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/DataArray'
                partOf:
                  description: An array of parents as dictionaries.
                  type: object
                  properties:
                    data:
                      $ref: '#/components/schemas/DataArray'
                versions:
                  type: object
                  description: An array of versions as dictionaries.
                  properties:
                    data:
                      $ref: '#/components/schemas/DataArray'
                versionOf:
                  type: object
                  description: An array of objects to which this DOI is a version as dictionaries.
                  properties:
                    data:
                      $ref: '#/components/schemas/DataArray'
          required:
          - type
      example:
        data:
          type: dois
          attributes:
            doi: 10.5438/0014
            prefix: '10.5438'
            suffix: '0014'
            identifiers:
            - identifier: https://doi.org/10.5438/0014
              identifierType: DOI
            creators:
            - name: DataCite Metadata Working Group
            titles:
            - title: DataCite Metadata Schema Documentation for the Publication and Citation of Research Data v4.1
            publisher: DataCite
            publicationYear: 2017
            types:
              resourceTypeGeneral: Text
            url: https://schema.datacite.org/meta/kernel-4.1/
    DoiPropertiesOther:
      type: object
      properties:
        url:
          description: The landing page URL of the DOI.
          type: string
        contentUrl:
          description: An array of content URLs associated with the DOI.
          type: array
          items:
            type: string
        metadataVersion:
          description: The version of the stored DataCite metadata, incremented once per update.
          readOnly: true
          type: number
        schemaVersion:
          description: The DataCite Metadata Schema version of the stored DOI metadata represented as a URL. When creating or updating a DOI, `schemaVersion` is not necessary unless modifying the DataCite Metadata Schema version.
          type: string
        source:
          allOf:
          - description: The system used to create the DOI.
          - readOnly: true
          - $ref: '#/components/schemas/source'
        isActive:
          description: '"true" if the DOI is in [Findable state](https://support.datacite.org/docs/doi-states#findable-doi-name). Otherwise, "false".'
          readOnly: true
          type: boolean
        state:
          allOf:
          - description: The [state of the DOI](https://support.datacite.org/docs/doi-states).
          - readOnly: true
          - $ref: '#/components/schemas/state'
        reason:
          description: Legacy attribute for EZID compatibility.
          readOnly: true
          type: string
    MetaCore:
      type: object
