        valueUri:
          type: string
        lang:
          type: string
        classificationCode:
          type: string
          example: '2.4'
    resourceTypeGeneral:
      description: '[DataCite Metadata Schema: resourceTypeGeneral](https://datacite-metadata-schema.readthedocs.io/en/4/appendices/appendix-1/resourceTypeGeneral/)'
      type: string
      enum:
      - Audiovisual
      - Award
      - Book
      - BookChapter
      - Collection
      - ComputationalNotebook
      - ConferencePaper
      - ConferenceProceeding
      - DataPaper
      - Dataset
      - Dissertation
      - Event
      - Image
      - Instrument
      - InteractiveResource
      - Journal
      - JournalArticle
      - Model
      - OutputManagementPlan
      - PeerReview
      - PhysicalObject
      - Poster
      - Preprint
      - Presentation
      - Project
      - Report
      - Service
      - Software
      - Sound
      - Standard
      - StudyRegistration
      - Text
      - Workflow
      - Other
    titleType:
