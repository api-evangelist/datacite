          type: string
          readOnly: true
        registered:
          description: The date the DOI was registered in the global handle server.
          type: string
          readOnly: true
        updated:
          description: The date the DOI was last updated.
          type: string
          readOnly: true
    certificate:
      type: string
      enum:
      - CLARIN
      - CoreTrustSeal
      - DIN 31644
      - DINI
      - DSA
      - RatSWD
      - WDS
    contributorType:
      description: '[DataCite Metadata Schema: contributorType](https://datacite-metadata-schema.readthedocs.io/en/4/appendices/appendix-1/contributorType/)'
      type: string
      enum:
      - ContactPerson
      - DataCollector
      - DataCurator
      - DataManager
      - Distributor
      - Editor
      - HostingInstitution
      - Producer
      - ProjectLeader
      - ProjectManager
      - ProjectMember
      - RegistrationAgency
      - RegistrationAuthority
      - RelatedPerson
      - Researcher
      - ResearchGroup
      - RightsHolder
      - Sponsor
      - Supervisor
      - Translator
      - WorkPackageLeader
      - Other
    referenceCount:
      description: Total references, pulled from Event Data.
      readOnly: true
      type: number
    downloadCount:
      description: Total downloads, pulled from Event Data.
      readOnly: true
      type: number
    source:
      type: string
      enum:
      - mds
      - api
      - fabricaForm
      - fabrica
      - ez
    DataObject:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
    viewCount:
      description: Total views, pulled from Event Data.
      readOnly: true
      type: number
    client-type:
      type: string
      enum:
      - repository
      - periodical
      - igsnCatalog
      - raidRegistry
    MetaArray:
      type: array
      items:
        $ref: '#/components/schemas/MetaObject'
    versionOfCount:
      description: Total number to which this DOI is a version, pulled from Event Data.
      readOnly: true
      type: number
    DoiListItem:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum:
          - dois
        attributes:
          allOf:
          - type: object
            properties:
              doi:
                type: string
              identifiers:
                type: array
                items:
                  type: object
                  properties:
                    identifier:
                      type: string
                    identifierType:
                      type: string
          - $ref: '#/components/schemas/DoiPropertiesMetadata'
          - $ref: '#/components/schemas/DoiPropertiesOther'
          - type: object
            properties:
              viewCount:
                $ref: '#/components/schemas/viewCount'
              downloadCount:
                $ref: '#/components/schemas/downloadCount'
              referenceCount:
                $ref: '#/components/schemas/referenceCount'
              citationCount:
                $ref: '#/components/schemas/citationCount'
              partCount:
                $ref: '#/components/schemas/partCount'
              partOfCount:
                $ref: '#/components/schemas/partOfCount'
              versionCount:
                $ref: '#/components/schemas/versionCount'
