          - $ref: '#/components/schemas/DoiPropertiesDates'
          required:
          - publisher
          - publicationYear
        relationships:
          type: object
          properties:
            client:
              type: object
              properties:
                data:
                  $ref: '#/components/schemas/DataObject'
      required:
      - type
    partCount:
      description: Total number of parts, pulled from Event Data.
      readOnly: true
      type: number
    state:
      type: string
      enum:
      - findable
