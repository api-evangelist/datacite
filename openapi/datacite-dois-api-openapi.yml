    relationType:
      description: '[DataCite Metadata Schema: relationType](https://datacite-metadata-schema.readthedocs.io/en/4/appendices/appendix-1/relationType/)'
      type: string
      enum:
      - IsCitedBy
      - Cites
      - IsSupplementTo
      - IsSupplementedBy
      - IsContinuedBy
      - Continues
      - IsDescribedBy
      - Describes
      - HasMetadata
      - IsMetadataFor
      - HasVersion
      - IsVersionOf
      - IsNewVersionOf
      - IsPreviousVersionOf
      - IsPartOf
      - HasPart
      - IsPublishedIn
      - IsReferencedBy
      - References
      - IsDocumentedBy
      - Documents
      - IsCompiledBy
      - Compiles
      - IsVariantFormOf
      - IsOriginalFormOf
      - IsIdenticalTo
      - IsReviewedBy
      - Reviews
      - IsDerivedFrom
      - IsSourceOf
      - IsRequiredBy
      - Requires
      - IsObsoletedBy
      - Obsoletes
      - IsCollectedBy
      - Collects
      - IsTranslationOf
      - HasTranslation
      - Other
  parameters:
    pageCursorParam:
      name: page[cursor]
      in: query
      schema:
        type: string
      description: Use for [cursor-based pagination](https://support.datacite.org/docs/pagination#method-2-cursor).
    consortiumIdParam:
      name: consortium-id
      in: query
      description: Filter by a specific DataCite consortium.
      schema:
        type: string
      example: ardc
    providerIdParam:
      name: provider-id
      in: query
      description: Filter by a specific DataCite provider (Direct Member or Consortium Organization). Use commas to include multiple providers.
      schema:
        type: string
      example: cern
    publisherParam:
      name: publisher
      in: query
      description: Set `publisher=true` to see additional publisher information such as the publisher identifier.
      schema:
        type: boolean
        example: true
    pageNumberParam:
      name: page[number]
      in: query
      schema:
        type: integer
      description: Page number for [pagination](https://support.datacite.org/docs/pagination).
    clientIdParam:
      name: client-id
      in: query
      description: Filter by a specific DataCite client (repository). Use commas to include multiple repositories.
      schema:
        type: string
      example: datacite.blog
    affiliationParam:
      name: affiliation
      in: query
      description: Set `affiliation=true` to see additional affiliation information such as the affiliation identifier.
      schema:
        type: boolean
        example: true
    pageSizeParam:
      name: page[size]
      in: query
      schema:
        type: integer
        minimum: 0
        maximum: 1000
      description: Page size between 0 and 1,000 for [pagination](https://support.datacite.org/docs/pagination).
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
